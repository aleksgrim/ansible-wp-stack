---

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure nginx cache directory exists
  ansible.builtin.file:
    path: "{{ nginx_cache_path }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Remove legacy fastcgi_cache_path from nginx.conf
  ansible.builtin.lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: '^\s*fastcgi_cache_path.*'
    state: absent
  notify: Reload nginx

- name: Deploy FastCGI cache config
  ansible.builtin.template:
    src: fastcgi_cache.conf.j2
    dest: /etc/nginx/conf.d/fastcgi_cache.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Deploy Nginx vhost config
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ domain }}"
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Enable site (symlink to sites-enabled)
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ domain }}"
    dest: "/etc/nginx/sites-enabled/{{ domain }}"
    state: link
  notify: Reload nginx

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false
