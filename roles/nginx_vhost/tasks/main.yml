---

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure nginx cache directory exists
  ansible.builtin.file:
    path: "{{ nginx_cache_path }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Ensure fastcgi_cache_path is in nginx.conf
  ansible.builtin.blockinfile:
    path: /etc/nginx/nginx.conf
    insertafter: "http {"
    marker: "# {mark} FASTCGI CACHE GLOBAL"
    block: |
      fastcgi_cache_path {{ nginx_cache_path }}
          levels=1:2
          keys_zone={{ nginx_cache_zone }}:100m
          inactive=60m
          max_size=1g;
      fastcgi_cache_key "$scheme$request_method$host$request_uri";
  notify: Reload nginx

- name: Deploy Nginx vhost config
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ domain }}"
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Enable site (symlink to sites-enabled)
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ domain }}"
    dest: "/etc/nginx/sites-enabled/{{ domain }}"
    state: link
  notify: Reload nginx

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false
  failed_when: false
  register: nginx_test

- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded
  when: nginx_test.rc == 0
