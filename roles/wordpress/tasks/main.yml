---
- name: Download WordPress
  ansible.builtin.get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz
    mode: '0644'

- name: Extract WordPress
  ansible.builtin.unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /tmp/
    remote_src: true
    creates: /tmp/wordpress/wp-login.php

- name: Copy WordPress files to webroot
  ansible.builtin.copy:
    src: /tmp/wordpress/
    dest: "{{ webroot }}/"
    owner: "{{ site_user }}"
    group: www-data
    remote_src: true

- name: Set directory permissions
  ansible.builtin.command:
    cmd: "find {{ webroot }} -type d -exec chmod 755 {} +"
  changed_when: true

- name: Set file permissions
  ansible.builtin.command:
    cmd: "find {{ webroot }} -type f -exec chmod 644 {} +"
  changed_when: true

- name: Fetch WP salt keys
  ansible.builtin.uri:
    url: https://api.wordpress.org/secret-key/1.1/salt/
    return_content: true
  register: wp_salts_response
  delegate_to: localhost

- name: Deploy wp-config.php
  ansible.builtin.template:
    src: wp-config.php.j2
    dest: "{{ webroot }}/wp-config.php"
    owner: "{{ site_user }}"
    group: www-data
    mode: '0640'
  vars:
    wp_salts: "{{ wp_salts_response.content }}"

- name: Remove wp-config-sample.php
  ansible.builtin.file:
    path: "{{ webroot }}/wp-config-sample.php"
    state: absent


- name: Ensure MySQL user password matches wp-config
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    host: localhost
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Clean up tmp
  ansible.builtin.file:
    path: /tmp/wordpress.tar.gz
    state: absent
