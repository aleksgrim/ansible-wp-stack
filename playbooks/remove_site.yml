---
# Remove a site:
# ansible-playbook -i inventory/hosts.yml playbooks/remove_site.yml -e "domain=mysite.com"

- name: Remove WordPress site
  hosts: vps
  gather_facts: false

  vars:
    php_version: "8.5"

    site_user:  "{{ domain | regex_replace('\\..*$', '') }}---admin"
    site_name:  "{{ domain | regex_replace('\\..*$', '') | replace('-', '_') }}"
    chroot_dir: "/var/www/{{ site_user }}"
    sock_name:  "php{{ php_version }}-fpm-{{ domain | regex_replace('\\..*$', '') }}"
    pool_name:  "{{ site_user }}"

  pre_tasks:
    - name: Confirm deletion
      ansible.builtin.pause:
        prompt: "Remove site {{ domain }}? Type 'YES' to confirm"
      register: confirm

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Aborted by user"
      when: confirm.user_input != "YES"

  tasks:
    - name: Remove Nginx vhost
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/etc/nginx/sites-enabled/{{ domain }}"
        - "/etc/nginx/sites-available/{{ domain }}"
      notify: Reload nginx

    - name: Remove PHP-FPM pool config
      ansible.builtin.file:
        path: "/etc/php/{{ php_version }}/fpm/pool.d/{{ pool_name }}.conf"
        state: absent

    - name: Stop PHP-FPM to release all pool processes
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: stopped

    - name: Kill any remaining processes owned by site user
      ansible.builtin.shell: |
        uid=$(id -u {{ site_user }} 2>/dev/null) || exit 0
        [ -z "$uid" ] && exit 0
        pkill -9 -u "$uid" 2>/dev/null || true
      changed_when: false

    - name: Wait for processes to die
      ansible.builtin.pause:
        seconds: 2

    - name: Start PHP-FPM back up
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: started

    - name: Remove SFTP chroot block from sshd_config
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} SFTP CHROOT {{ site_user }}"
        state: absent
      notify: Reload ssh

    - name: Drop MySQL database
      community.mysql.mysql_db:
        name: "{{ site_name }}"
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Drop MySQL user
      community.mysql.mysql_user:
        name: "{{ site_name }}"
        host: localhost
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Remove webroot directory
      ansible.builtin.file:
        path: "{{ chroot_dir }}"
        state: absent

    - name: Remove system user
      ansible.builtin.user:
        name: "{{ site_user }}"
        state: absent
        remove: true

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Reload ssh
      ansible.builtin.service:
        name: ssh
        state: reloaded

        